# HTTP: serve ACME challenges for certbot, redirect everything else to HTTPS.
server {
    listen 80;
    server_name split-even-wiser.com mail.split-even-wiser.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: React SPA + Laravel API on one origin.
server {
    listen 443 ssl;
    server_name split-even-wiser.com;

    ssl_certificate     /etc/letsencrypt/live/split-even-wiser.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/split-even-wiser.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 20m;

    # Laravel API - identical try_files/fastcgi logic to docker/nginx/default.conf (dev),
    # just scoped under /api so it doesn't shadow the SPA routes below.
    location /api {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Laravel's public storage symlink (avatars etc.) - must be served from
    # the Laravel public dir, otherwise it falls through to the SPA catch-all
    # below and returns index.html instead of the image.
    location /storage {
        root /var/www/html/public;
        try_files $uri =404;
    }

    # React SPA (everything that isn't /api, *.php, or /storage) - client-side routing handles
    # paths like /login, so any unmatched path falls back to index.html.
    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
