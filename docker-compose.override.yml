# Auto-loaded by plain `docker compose up` (never included in the prod overlay's
# explicit -f list), so these overrides only apply to local dev.
#
# Local dev sends mail through Mailhog (view at http://localhost:8026) rather than
# the docker-mailserver container, which is heavier and only worth exercising when
# you actually need to test real SMTP delivery/DKIM/etc — see docker/mailserver/README.
# Keeping these out of docker-compose.yml itself means backend/.env's MAIL_* values
# (e.g. in prod) are no longer silently shadowed by these.
services:
  app:
    environment:
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null

  queue:
    environment:
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
