services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: split_even_wiser
      POSTGRES_USER: split_even_wiser
      POSTGRES_PASSWORD: split_even_wiser
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U split_even_wiser"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      # Local dev sends mail through Mailhog (view at http://localhost:8026) rather than
      # the docker-mailserver container, which is heavier and only worth exercising when
      # you actually need to test real SMTP delivery/DKIM/etc — see docker/mailserver/README.
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=1"]
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"
    depends_on:
      - app

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8026:8025" # web UI: view every mail the app sends in dev
      - "1026:1025" # SMTP submission (only needed for host-side tools; the app talks to
                     # mailhog:1025 over the internal docker network regardless)

  # A production-shaped mailserver, per the spec ("nutzt docker-mailserver für den
  # E-Mail-Versand"). Not used by default in local dev — see docker/mailserver/README.md
  # for how to point the app at it instead of Mailhog.
  mailserver:
    image: docker.io/mailserver/docker-mailserver:latest
    hostname: mail.split-even-wiser.local
    restart: unless-stopped
    env_file:
      - ./docker/mailserver/mailserver.env
    ports:
      - "25:25"
      - "587:587"
      - "993:993"
    volumes:
      - mail-data:/var/mail
      - mail-state:/var/mail-state
      - mail-logs:/var/log/mail
      - ./docker/mailserver/config:/tmp/docker-mailserver
    cap_add:
      - NET_ADMIN

volumes:
  postgres-data:
  redis-data:
  mail-data:
  mail-state:
  mail-logs:
